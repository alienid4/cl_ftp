# SF File Exchange Portal — nginx 反向代理設定
# 對應 Windows: IIS + URL Rewrite + ARR
# 部署位置: /etc/nginx/conf.d/sf-portal.conf

# === 後端 upstream ===
upstream sf_portal_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# === HTTP (PoC, 之後可改成 redirect 到 HTTPS) ===
server {
    listen 80;
    server_name _;

    # 訪問 log
    access_log /var/log/nginx/sf-portal-access.log;
    error_log  /var/log/nginx/sf-portal-error.log;

    # 反向代理
    location / {
        proxy_pass http://sf_portal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 上傳大檔 (簽核附件)
        client_max_body_size 100M;
        proxy_read_timeout 300s;
    }

    # 靜態檔直接給 nginx 服務 (省 Flask 流量)
    location /static/ {
        alias /opt/portal/app/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Health check 不過 Flask
    location = /nginx-health {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }
}

