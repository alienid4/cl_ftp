# SF File Exchange Server — Samba 4 設定 (Linux 版)
# 對應 Windows: SMB Share + AD 群組 ACL
# 部署位置: /etc/samba/smb.conf

[global]
    workgroup = CORP
    realm = CORP.LOCAL
    security = ads
    kerberos method = system keytab
    template homedir = /home/%U
    template shell = /bin/bash
    winbind use default domain = yes
    winbind offline logon = false

    # Log
    log file = /var/log/samba/log.%m
    max log size = 50
    log level = 1

    # 強制 SMB2+ (停用 SMB1, 對應 Windows Hardening)
    server min protocol = SMB2_02
    client min protocol = SMB2_02

    # 啟用 SACL audit (對應主管圖稽核要求)
    full_audit:prefix = %u|%I|%S
    full_audit:success = connect disconnect open close write unlink rename
    full_audit:failure = connect open
    full_audit:facility = local5
    full_audit:priority = NOTICE

    # 預設停用所有 share, 個別開
    map to guest = bad user

# === 部門下載區 (OA USER 從 Windows 訪問) ===

[architecture]
    path = /data/exchange/samba/architecture
    valid users = @"CORP\dept_archi_view", @"CORP\dept_it_admins"
    read only = no
    create mask = 0660
    directory mask = 2770
    vfs objects = full_audit
    comment = SF Exchange - Architecture Department

