name: Build EPEL Python RPM Bundle

# 用途: Rocky Linux 9 容器抓 EPEL Python RPMs 打成 tar
# 觸發: 手動 (Actions 頁 Run workflow) 或 push 到 main

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'deploy-rhel/build_epel_pyrpms.sh'
      - '.github/workflows/build-epel-pyrpms.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Show environment
        run: |
          echo "=== Runner OS ==="
          uname -a
          echo ""
          echo "=== Docker version ==="
          docker --version
          echo ""
          echo "=== Repo files ==="
          ls -la deploy-rhel/build_epel_pyrpms.sh

      - name: Build EPEL bundle in Rocky 9
        run: |
          mkdir -p output
          # 把容器內所有輸出寫進 build.log, 失敗也能看
          docker run --rm \
            -v "${PWD}:/repo:ro" \
            -v "${PWD}/output:/output" \
            rockylinux:9 \
            /bin/bash -c '
              set -ex
              exec > >(tee -a /output/build.log) 2>&1
              echo "=== Container info ==="
              cat /etc/redhat-release
              echo "uname: $(uname -a)"
              echo ""
              echo "=== Installing prereqs (which / awk / etc) ==="
              dnf install -y --setopt=install_weak_deps=False \
                  which awk findutils tar gzip coreutils 2>&1 | tail -5
              echo ""
              echo "=== Running build script ==="
              bash /repo/deploy-rhel/build_epel_pyrpms.sh /output
            ' || {
              echo "[BUILD FAILED] 印出 build.log 末段:"
              tail -50 output/build.log 2>/dev/null || echo "(no build.log)"
              exit 1
            }

      - name: List output
        run: |
          ls -lh output/
          cat output/sf-epel-pyrpms.tar.gz.sha256

      - name: Commit tar to release-zip/
        run: |
          cp output/sf-epel-pyrpms.tar.gz release-zip/sf-epel-pyrpms.tar.gz
          cp output/sf-epel-pyrpms.tar.gz.sha256 release-zip/sf-epel-pyrpms.tar.gz.sha256

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add release-zip/sf-epel-pyrpms.tar.gz release-zip/sf-epel-pyrpms.tar.gz.sha256

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "ci: update EPEL Python RPM bundle [skip-version]"
          git push origin HEAD:main

      - name: Upload artifact (always, 含 build.log 給 debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sf-epel-pyrpms
          path: |
            output/sf-epel-pyrpms.tar.gz
            output/sf-epel-pyrpms.tar.gz.sha256
            output/build.log
          if-no-files-found: warn
          retention-days: 14
